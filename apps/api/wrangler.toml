#:schema node_modules/wrangler/config-schema.json

# Agent Skill Depot — Cloudflare Worker
#
# Two environments:
#   default (production) → wrangler deploy           → agentskilldepot.com
#   dev                  → wrangler deploy --env dev → skillhub-dev.<subdomain>.workers.dev
#
# Secrets are NOT in this file. Set via:
#   wrangler secret put DATABASE_URL
#   wrangler secret put API_KEY_HASH_SECRET
#   ... etc
#
# Public env vars (non-secret) are in [vars] below.

name = "skillhub"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
# Keep workers.dev as a fallback URL while the custom domain is the primary
workers_dev = true

# Custom domain — Cloudflare auto-creates DNS since the zone is in this account
[[routes]]
pattern = "agentskilldepot.com"
zone_name = "agentskilldepot.com"
custom_domain = true

[[routes]]
pattern = "www.agentskilldepot.com"
zone_name = "agentskilldepot.com"
custom_domain = true

# Admin surface — read-only v1, gated by Cloudflare Access.
# Requires: (1) DNS CNAME `admin -> agentskilldepot.com` in Cloudflare,
# (2) Access application for `admin.agentskilldepot.com` with an
# email-allowlist policy. See infra/DEPLOY.md.
[[routes]]
pattern = "admin.agentskilldepot.com"
zone_name = "agentskilldepot.com"
custom_domain = true

# Native Cron Triggers (no Inngest needed for the MVP)
[triggers]
crons = [
  "13 * * * *",  # recompute-rankings, hourly at :13
  "37 * * * *",  # refresh-user-stats matview, hourly at :37
  "7 * * * *",   # mirror-to-github, hourly at :07
]

# Static assets (CSS, favicon, etc.) served directly from /public
[assets]
directory = "./public"
binding = "ASSETS"

# R2 binding for skill files (production bucket)
[[r2_buckets]]
binding = "SKILLS_BUCKET"
bucket_name = "skillhub-skills-prod"
preview_bucket_name = "skillhub-skills-dev"

# Workers AI binding — used by src/lib/embeddings.ts as the primary embedding
# backend (Voyage is kept as fallback for local/offline tooling). Free tier
# is 10K neurons/day, no credit card required. See docs/api-changelog.md.
[ai]
binding = "AI"

# Public env vars (overridable per-environment below)
[vars]
APP_URL = "https://agentskilldepot.com"
AGENT_KEY_PREFIX = "skh_live_"
VOYAGE_MODEL = "voyage-3"
ENVIRONMENT = "production"
SIGNED_URL_TTL = "300"
# Anti-exfiltration LLM classifier. When "true" the publish pipeline calls
# the Haiku classifier via apps/api/src/lib/scrub/exfiltration-llm.ts as an
# additional review-tier pass. When "false" (default) the stub short-circuits
# and no Anthropic API calls are made. Requires ANTHROPIC_API_KEY secret
# before flipping to "true".
EXFIL_LLM_ENABLED = "false"

# ─────────────────────────────────────────────────────────────────────────────
# DEV environment (preview deploys, points at the dev Neon branch + dev R2 bucket)
# ─────────────────────────────────────────────────────────────────────────────
[env.dev]
name = "skillhub-dev"
# Account has a 5-cron limit across all Workers; prod uses 3. Dev doesn't
# need the prod schedulers (rankings/user-stats/mirror), so we clear them
# for this env to stay under the limit.
[env.dev.triggers]
crons = []

[env.dev.vars]
APP_URL = "https://skillhub-dev.workers.dev"
AGENT_KEY_PREFIX = "skh_live_"
VOYAGE_MODEL = "voyage-3"
ENVIRONMENT = "dev"
SIGNED_URL_TTL = "300"
EXFIL_LLM_ENABLED = "false"

[[env.dev.r2_buckets]]
binding = "SKILLS_BUCKET"
bucket_name = "skillhub-skills-dev"

[env.dev.ai]
binding = "AI"

[env.dev.assets]
directory = "./public"
binding = "ASSETS"
