name: CodeQL

# Phase 0 §0.11 — static analysis for security issues.
# Free for public repos. Runs weekly + on every PR to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep, Monday 06:13 UTC (off-peak, avoids all the minute-0
    # jobs clustering around the top of the hour).
    - cron: "13 6 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "python"]

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
