name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: api (typecheck Cloudflare Worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version comes from package.json `packageManager` field.
        # Passing `version:` here conflicts with that since pnpm/action-setup@v4.

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (workspace root)
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test || echo "no tests yet"

      - name: Wrangler dry-run build
        # Validates the bundle compiles for the Workers runtime without
        # actually deploying. Catches things like missing nodejs_compat
        # imports, broken module graphs, oversized bundles, etc.
        run: pnpm exec wrangler deploy --dry-run --outdir=.dry-run

  base-skill:
    name: base-skill (sanitize + package smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Stub a minimal skill-creator (just enough for package.py)
        run: |
          mkdir -p $HOME/.claude/skills/skill-creator/scripts
          touch $HOME/.claude/skills/skill-creator/scripts/__init__.py
          cat > $HOME/.claude/skills/skill-creator/scripts/quick_validate.py <<'EOF'
          def validate_skill(path):
              return True, "stub validator (CI only)"
          EOF
          cat > $HOME/.claude/skills/skill-creator/scripts/package_skill.py <<'EOF'
          import sys, zipfile
          from pathlib import Path
          try:
              from scripts.quick_validate import validate_skill
          except ImportError:
              from quick_validate import validate_skill

          def package_skill(skill_path, output_dir=None):
              skill_path = Path(skill_path).resolve()
              output_dir = Path(output_dir or ".").resolve()
              output_dir.mkdir(parents=True, exist_ok=True)
              out = output_dir / f"{skill_path.name}.skill"
              with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
                  for p in skill_path.rglob("*"):
                      if p.is_file():
                          zf.write(p, p.relative_to(skill_path.parent))
              return out

          if __name__ == "__main__":
              package_skill(sys.argv[1], sys.argv[2] if len(sys.argv) > 2 else None)
          EOF

      - name: sanitize.py self-test (must not return 'block')
        run: |
          python3 base-skill/skillhub/scripts/sanitize.py base-skill/skillhub --json-only > /tmp/scrub_report.json
          python3 -c "
          import json, sys
          r = json.load(open('/tmp/scrub_report.json'))
          print(f\"overall_severity={r['overall_severity']} findings={r['scan_stats']['total_findings']}\")
          assert r['overall_severity'] != 'block', r
          "

      - name: intent_detect.py sanity checks (positive + negative cases)
        run: |
          python3 base-skill/skillhub/scripts/intent_detect.py "extract tables from this pdf" > /tmp/detect_pos.json
          python3 -c "import json; r=json.load(open('/tmp/detect_pos.json')); assert r['is_task'] is True, r"
          python3 base-skill/skillhub/scripts/intent_detect.py "what is the meaning of life" > /tmp/detect_neg.json
          python3 -c "import json; r=json.load(open('/tmp/detect_neg.json')); assert r['is_task'] is False, r"

      - name: identity.py status (unregistered)
        run: |
          rm -f $HOME/.claude/skills/skillhub/.identity.json
          # Status returns exit 1 when unregistered — that's correct, not a failure
          python3 base-skill/skillhub/scripts/identity.py status && exit 1 || true

      - name: Package the base skill
        run: |
          mkdir -p dist
          python3 base-skill/skillhub/scripts/package.py base-skill/skillhub dist/skillhub.skill
          test -f dist/skillhub.skill
          python3 -c "
          import zipfile
          z = zipfile.ZipFile('dist/skillhub.skill')
          names = z.namelist()
          assert any(n.endswith('SKILL.md') for n in names), names
          assert any(n.endswith('LICENSE.txt') for n in names), names
          assert any(n.endswith('scripts/sanitize.py') for n in names), names
          assert any(n.endswith('references/scrubbing.md') for n in names), names
          print(f'package ok: {len(names)} files, sha256:', __import__('hashlib').sha256(open('dist/skillhub.skill', 'rb').read()).hexdigest()[:16])
          "

      - name: Upload .skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillhub.skill
          path: dist/skillhub.skill
          retention-days: 14

  api-changelog:
    # Phase 0 §0.10 — enforce docs/api-changelog.md is updated
    # whenever a PR touches API routes or the api-reference doc.
    name: api-changelog (enforce docs/api-changelog.md update)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for API-touching changes without changelog update
        run: |
          BASE="${{ github.base_ref }}"
          git fetch origin "$BASE" --depth=1

          CHANGED=$(git diff --name-only "origin/$BASE"...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          TOUCHES_API=false
          if echo "$CHANGED" | grep -qE '^apps/api/src/routes/.*\.ts$'; then
            TOUCHES_API=true
          fi
          if echo "$CHANGED" | grep -qE '^base-skill/skillhub/references/api-reference\.md$'; then
            TOUCHES_API=true
          fi

          if [ "$TOUCHES_API" = "true" ]; then
            if ! echo "$CHANGED" | grep -q '^docs/api-changelog\.md$'; then
              echo ""
              echo "::error::This PR modifies API routes or api-reference.md but does not update docs/api-changelog.md."
              echo "::error::See docs/api-versioning.md for the policy — every API-touching change needs a changelog entry."
              exit 1
            fi
            echo "✓ API changes are accompanied by a changelog update"
          else
            echo "✓ No API changes in this PR — no changelog update required"
          fi
