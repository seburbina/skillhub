name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: web (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint || echo "lint not fatal yet"

      - name: Test
        run: pnpm test -- --run || echo "no tests yet"

  base-skill:
    name: base-skill (sanitize + package smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create a minimal fake skill-creator (just enough for package.py)
        run: |
          mkdir -p $HOME/.claude/skills/skill-creator/scripts
          cat > $HOME/.claude/skills/skill-creator/scripts/__init__.py <<'EOF'
          EOF
          cat > $HOME/.claude/skills/skill-creator/scripts/quick_validate.py <<'EOF'
          def validate_skill(path):
              return True, "stub validator — CI only"
          EOF
          cat > $HOME/.claude/skills/skill-creator/scripts/package_skill.py <<'EOF'
          import sys, zipfile
          from pathlib import Path
          try:
              from scripts.quick_validate import validate_skill
          except ImportError:
              from quick_validate import validate_skill

          def package_skill(skill_path, output_dir=None):
              skill_path = Path(skill_path).resolve()
              output_dir = Path(output_dir or ".").resolve()
              output_dir.mkdir(parents=True, exist_ok=True)
              out = output_dir / f"{skill_path.name}.skill"
              ok, _ = validate_skill(skill_path)
              if not ok:
                  return None
              with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
                  for p in skill_path.rglob("*"):
                      if p.is_file():
                          zf.write(p, p.relative_to(skill_path.parent))
              return out

          if __name__ == "__main__":
              package_skill(sys.argv[1], sys.argv[2] if len(sys.argv) > 2 else None)
          EOF

      - name: Run sanitize.py against the base skill
        run: |
          python3 base-skill/skillhub/scripts/sanitize.py base-skill/skillhub --json-only > scrub_report.json
          python3 -c "import json; r=json.load(open('scrub_report.json')); assert r['overall_severity'] != 'block', r"

      - name: Run intent_detect.py sanity checks
        run: |
          python3 base-skill/skillhub/scripts/intent_detect.py "extract tables from this pdf" | tee /tmp/detect.json
          python3 -c "import json; r=json.load(open('/tmp/detect.json')); assert r['is_task'] is True, r"

      - name: Package the base skill
        run: |
          mkdir -p dist
          python3 base-skill/skillhub/scripts/package.py base-skill/skillhub dist/skillhub.skill
          test -f dist/skillhub.skill
          python3 -c "import zipfile; z=zipfile.ZipFile('dist/skillhub.skill'); assert any(n.endswith('SKILL.md') for n in z.namelist())"
